*{box-sizing:border-box;margin:0;padding:0;}
body{

}

/* HEADER */
.header{
  position:sticky;
  top:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffffffcc;
  backdrop-filter:blur(10px);
  padding:12px 20px;
  border-bottom:1px solid #ddd;
  z-index:1000;
}
.back-link{
  position:absolute;
  left:16px;
  color:#007aff;
  text-decoration:none;
  font-size:28px;
  font-weight:600;
}
.header-center{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.header-logo{
  width:48px;
  height:48px;
  border-radius:50%;
  border:1px solid #ddd;
}
.header-title{
  font-weight:600;
  font-size:20px;
}
.language-switcher{
  position:absolute;
  right:16px;
}
.language-switcher select{
  padding:8px 12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-weight:600;
  background:#fff;
  cursor:pointer;
}

/* LAYOUT */
.container{
  display:flex;
  flex-direction:column;
  gap:22px;
  padding:40px 16px 48px;
}
.card{
  background:#fff;
  padding:28px 24px;
  border-radius:24px;
  box-shadow:0 8px 30px rgba(0,0,0,0.08);
  max-width:760px;
  width:100%;
  margin:0 auto;
}
.card-intro{
  background:linear-gradient(135deg,#ffffff 0%,#eef7ff 100%);
  text-align:center;
}
.card-umrah{
  background:linear-gradient(135deg,#ffffff 0%,#e9fbfb 100%);
}
.card-hajj{
  background:linear-gradient(135deg,#ffffff 0%,#fff7e6 100%);
}
.card h1{
  font-size:26px;
  margin-bottom:10px;
  text-align:center;
}
.card h2{
  font-size:22px;
  margin-bottom:16px;
  text-align:center;
}
.card p{
  color:#3c3c43;
  font-size:16px;
}

/* FAQ */
.faq-item{
  text-align:left;
  border-top:1px solid #e5e5ea;
  padding:16px 0;
  cursor:pointer;
}
.faq-item:first-of-type{
  border-top:none;
}
.faq-item strong{
  display:block;
  font-size:18px;
  color:#1c1c1e;
  padding-right:26px;
  position:relative;
}
.faq-item strong::after{
  content:"+";
  position:absolute;
  right:0;
  top:0;
  color:#00a6c8;
  font-size:22px;
  line-height:1;
}
.faq-item.open strong::after{
  content:"−";
}
.faq-item p{
  display:none;
  margin-top:10px;
  color:#4b5563;
  font-size:16px;
}
.faq-item.open p{
  display:block;
}
.faq-item ul{
  display:none;
  margin-top:10px;
  padding-left:22px;
  color:#4b5563;
}
.faq-item.open ul{
  display:block;
}
.faq-item li{
  margin:4px 0;
}

/* BUTTON */
a.button{
  display:block;
  max-width:420px;
  width:100%;
  margin:18px auto 0;
  padding:15px;
  border-radius:18px;
  font-size:17px;
  font-weight:600;
  text-align:center;
  color:#fff;
  background:#007aff;
  box-shadow:0 6px 15px rgba(0,122,255,0.3);
  transition:all 0.25s ease;
  text-decoration:none;
}
a.button:hover{
  transform:translateY(-2px);
  background:#00a6c8;
  box-shadow:0 10px 25px rgba(0,166,200,0.35);
}

@media(max-width:600px){
  .header{padding:10px 12px;}
  .header-title{font-size:17px;}
  .header-logo{width:42px;height:42px;}
  .back-link{left:10px;font-size:26px;}
  .language-switcher{right:10px;}
  .language-switcher select{padding:7px 8px;font-size:13px;}
  .card{padding:24px 18px;border-radius:20px;}
  .card h1{font-size:23px;}
  .card h2{font-size:20px;}
  .faq-item strong{font-size:17px;}
}
</style>

let currentLang = localStorage.getItem("selectedLang") || "tr";

function setLanguage(lang){
  currentLang = lang;
  localStorage.setItem("selectedLang", lang);
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.dataset.i18n;
    if(translations[lang] && translations[lang][key]){
      el.innerText = translations[lang][key];
    }
  });
  const select = document.querySelector(".language-switcher select");
  if(select) select.value = lang;
}

function toggleFaq(el){
  el.classList.toggle("open");
}

setLanguage(currentLang);
